<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiraeth.zsh | Creative 3D & AR Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root {
            --primary: #3b82f6;
            --accent: #fbbf24;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.3s ease; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .dark body { background-color: #0f172a; color: white; }
        .dark .glass-card { background: rgba(30, 41, 59, 0.7); border-color: rgba(255, 255, 255, 0.1); }
        .dark .service-card { background: #1e293b; color: white; }

        .floating { animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .service-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .service-card:hover { transform: scale(1.08) rotate(2deg); background: var(--primary); color: white; }
        .service-card:hover i { color: white; transform: rotate(-10deg); }

        .blob {
            position: absolute; width: 300px; height: 300px;
            background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
            filter: blur(80px); opacity: 0.2; z-index: -1;
        }
    </style>
</head>
<body class="overflow-x-hidden">

    <div class="fixed top-5 right-5 z-[100]">
        <button onclick="toggleTheme()" class="bg-white dark:bg-slate-800 p-3 rounded-full shadow-lg border border-slate-200 dark:border-slate-700 active:scale-90 transition">
            <i id="theme-icon" class="fa-solid fa-moon text-blue-600"></i>
        </button>
    </div>

    <div class="blob top-0 -left-20"></div>
    <div class="blob bottom-0 -right-20" style="background: #fbbf24"></div>

    <header class="min-h-screen flex items-center justify-center px-6 pt-20">
        <div class="max-w-5xl mx-auto flex flex-col md:flex-row items-center gap-12 text-center md:text-left">
            <div class="flex-1" data-aos="fade-right">
                <span class="text-blue-600 font-bold tracking-widest uppercase text-sm mb-4 block">Hiraeth.zsh Studios</span>
                <h1 class="text-5xl md:text-7xl font-extrabold mb-6 leading-tight">Sulap Ide Jadi <span class="text-blue-600">Digital Reality.</span></h1>
                <p class="text-lg text-slate-500 dark:text-slate-400 mb-8 italic">Menerima joki 3D Modeling, Rendering, AR, hingga urusan Coding & Pengetikan.</p>
                <div class="flex flex-wrap gap-4 justify-center md:justify-start">
                    <a href="https://wa.me/6285155476769" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold shadow-lg shadow-blue-500/30 hover:shadow-blue-500/50 transition-all active:scale-95">Get Started</a>
                    <button onclick="document.getElementById('services').scrollIntoView({behavior:'smooth'})" class="px-8 py-4 rounded-2xl font-bold border-2 border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800 transition">See Services</button>
                </div>
            </div>
            <div class="flex-1 floating" data-aos="zoom-in">
                <div class="relative">
                    <div class="absolute inset-0 bg-blue-600 rounded-full blur-3xl opacity-20"></div>
                    <img src="https://illustrations.popsy.co/blue/3d-modeling.svg" alt="3D Illustration" class="w-full max-w-sm mx-auto relative z-10">
                </div>
            </div>
        </div>
    </header>

    <section class="py-20 px-6">
        <div class="max-w-6xl mx-auto grid grid-cols-2 md:grid-cols-4 gap-8">
            <div class="text-center" data-aos="fade-up" data-aos-delay="100">
                <h2 class="text-4xl font-bold text-blue-600">50+</h2>
                <p class="text-sm font-semibold text-slate-400 uppercase">Projects</p>
            </div>
            <div class="text-center" data-aos="fade-up" data-aos-delay="200">
                <h2 class="text-4xl font-bold text-blue-600">24/7</h2>
                <p class="text-sm font-semibold text-slate-400 uppercase">Support</p>
            </div>
            <div class="text-center" data-aos="fade-up" data-aos-delay="300">
                <h2 class="text-4xl font-bold text-blue-600">Fast</h2>
                <p class="text-sm font-semibold text-slate-400 uppercase">Response</p>
            </div>
            <div class="text-center" data-aos="fade-up" data-aos-delay="400">
                <h2 class="text-4xl font-bold text-blue-600">Top</h2>
                <p class="text-sm font-semibold text-slate-400 uppercase">Quality</p>
            </div>
        </div>
    </section>

    <section id="services" class="py-20 px-6">
        <div class="max-w-6xl mx-auto">
            <div class="text-center mb-16" data-aos="fade-up">
                <h2 class="text-3xl font-extrabold mb-4">Layanan Joki Profesional</h2>
                <div class="h-1.5 w-20 bg-blue-600 mx-auto rounded-full"></div>
            </div>

            <div class="grid grid-cols-2 lg:grid-cols-4 gap-6" id="service-grid">
                </div>
        </div>
    </section>

    <footer class="py-20 px-6 glass-card mt-20 text-center border-t border-slate-100 dark:border-slate-800">
        <h2 class="text-3xl font-black mb-8 italic">TENANG AJA, BISA KOK!</h2>
        <a href="https://wa.me/6285155476769" class="flex flex-col items-center group">
            <div class="w-20 h-20 bg-green-500 text-white rounded-full flex items-center justify-center text-4xl mb-4 group-hover:scale-110 transition-all shadow-xl">
                <i class="fa-brands fa-whatsapp"></i>
            </div>
            <span class="text-xl font-bold">0851-5547-6769</span>
        </a>
    </footer>

    <a href="https://wa.me/6285155476769" class="fixed bottom-6 right-6 w-14 h-14 bg-green-500 text-white rounded-full flex items-center justify-center text-2xl shadow-2xl z-[90] hover:scale-110 transition active:scale-90">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        const services = [
            { icon: 'fa-cube', name: 'Rendering' },
            { icon: 'fa-draw-polygon', name: '3D Modeling' },
            { icon: 'fa-vr-cardboard', name: 'AR Hub' },
            { icon: 'fa-keyboard', name: 'Jasa Ketik' },
            { icon: 'fa-code', name: 'Coding' },
            { icon: 'fa-globe', name: 'Website' },
            { icon: 'fa-mobile-screen', name: 'Mobile App' },
            { icon: 'fa-film', name: 'Animasi' }
        ];

        const grid = document.getElementById('service-grid');
        grid.innerHTML = services.map((s, i) => `
            <div class="service-card glass-card p-8 rounded-[40px] text-center" 
                 data-aos="zoom-in" data-aos-delay="${i * 50}"
                 onclick="window.open('https://wa.me/6285155476769?text=Halo%20saya%20tertarik%20jasa%20${s.name}')">
                <i class="fa-solid ${s.icon} text-4xl text-blue-600 mb-4 transition-all"></i>
                <h3 class="font-bold text-sm md:text-lg">${s.name}</h3>
            </div>
        `).join('');

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const icon = document.getElementById('theme-icon');
            if (document.documentElement.classList.contains('dark')) {
                icon.className = 'fa-solid fa-sun text-yellow-400';
            } else {
                icon.className = 'fa-solid fa-moon text-blue-600';
            }
        }
    </script>
</body>
</html>
